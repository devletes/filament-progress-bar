name: code-style

on:
    pull_request:
    push:
        branches:
            - main
            - master

jobs:
    pint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  coverage: none

            - uses: ramsey/composer-install@v3

            - run: vendor/bin/pint --test
