name: tests

on:
    pull_request:
    push:
        branches:
            - main
            - master
            - codex/**

jobs:
    tests:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php:
                    - "8.2"
                    - "8.3"

        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none

            - uses: ramsey/composer-install@v3

            - run: composer validate --strict
            - run: composer test
